<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}GroundTrack{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="{{ url_for('dashboard') }}">GroundTrack</a>
        <nav class="main-nav" aria-label="Primary navigation">
          {% for endpoint, label in nav_items %}
            <a
              href="{{ url_for(endpoint) }}"
              {% if request.endpoint == endpoint %}aria-current="page"{% endif %}
            >{{ label }}</a>
          {% endfor %}
        </nav>
      </div>
    </header>

    <main class="page {% block page_class %}{% endblock %}">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
