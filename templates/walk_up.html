{% extends "base.html" %}

{% block title %}Walk-Up - GroundTrack{% endblock %}

{% block content %}
  <a class="back-link" href="{{ url_for('dashboard') }}">← Back to Dashboard</a>

  <section class="page-header">
    <p class="eyebrow">GroundTrack</p>
    <h1>Walk-Up</h1>
    <p class="lead">Add a participant who was not in the registration spreadsheet.</p>
  </section>

  {% if message %}
    <div class="message message-{{ message_type }}" role="status">
      {{ message }}
    </div>
  {% endif %}

  <form class="data-form" action="{{ url_for('walk_up') }}" method="post">
    <label for="name">Name <span class="required-label">Required</span></label>
    <input id="name" name="name" type="text" value="{{ form.name }}" required autofocus>

    <label for="rank">Rank</label>
    <input id="rank" name="rank" type="text" value="{{ form.rank }}">

    <label for="nat">NAT <span class="required-label">Required</span></label>
    <input id="nat" name="nat" type="text" value="{{ form.nat }}" required>

    <label for="visit_request_status">Visit Request Status</label>
    <input
      id="visit_request_status"
      name="visit_request_status"
      type="text"
      value="{{ form.visit_request_status }}"
    >

    <label for="badge_number">Badge # <span class="required-label">Required</span></label>
    <input
      id="badge_number"
      name="badge_number"
      type="text"
      value="{{ form.badge_number }}"
      required
    >

    <label for="organization">Unit / Organization / Company</label>
    <input id="organization" name="organization" type="text" value="{{ form.organization }}">

    <label for="thread_initiative">
      Mission Area / Initiative <span class="required-label">Required</span>
    </label>
    <input
      id="thread_initiative"
      name="thread_initiative"
      type="text"
      value="{{ form.thread_initiative }}"
      required
    >

    <label class="checkbox-field" for="check_in_now">
      <input
        id="check_in_now"
        name="check_in_now"
        type="checkbox"
        value="1"
        {% if form.check_in_now %}checked{% endif %}
      >
      Check in now
    </label>

    <button type="submit">Add Walk-Up Participant</button>
  </form>
{% endblock %}
